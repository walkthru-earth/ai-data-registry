name: "Extract (Hetzner Runner)"
run-name: "Extract (Hetzner): ${{ inputs.workspace }}"

on:
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
      server_type:
        required: false
        type: string
        default: "cax11"
  workflow_dispatch:
    inputs:
      workspace:
        required: true
        type: string
        description: "Workspace name (directory under workspaces/)"
      server_type:
        required: false
        type: string
        default: "cax11"
        description: "Hetzner server type (cax11, cax21, cax31, cax41)"

concurrency:
  group: extract-${{ inputs.workspace }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  create-runner:
    name: Create Hetzner runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.hcloud.outputs.label }}
      server_id: ${{ steps.hcloud.outputs.server_id }}
    steps:
      - id: hcloud
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: ${{ inputs.server_type }}
          location: fsn1

  extract:
    name: "Extract: ${{ inputs.workspace }}"
    needs: create-runner
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          post-cleanup: true

      - name: Run pipeline
        env:
          OUTPUT_DIR: ${{ runner.temp }}/output
          WORKSPACE_SECRET_API_KEY: ${{ secrets[format('WS_{0}_API_KEY', inputs.workspace)] }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          pixi run --manifest-path "workspaces/$WORKSPACE/pixi.toml" pipeline

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Upload output to all storages
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_WRITE_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          S3_WRITE_SECRET: ${{ secrets.S3_WRITE_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKSPACE: ${{ inputs.workspace }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          uv run .github/scripts/upload_output.py \
            --workspace "$WORKSPACE" \
            --output-dir "${RUNNER_TEMP}/output" \
            --timestamp "$TIMESTAMP"

  delete-runner:
    name: Delete Hetzner runner
    needs: [create-runner, extract]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner.outputs.label }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
