name: "Extract (GitHub Runner)"
run-name: "Extract (GitHub): ${{ inputs.workspace }}"

on:
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      workspace:
        required: true
        type: string
        description: "Workspace name (directory under workspaces/)"

concurrency:
  group: extract-${{ inputs.workspace }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  extract:
    name: "Extract: ${{ inputs.workspace }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Register workspace
        run: |
          pixi workspace register \
            --name ${{ inputs.workspace }} \
            --path workspaces/${{ inputs.workspace }}

      - name: Pull workspace catalog from S3
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
        run: |
          CATALOG_PATH="${{ runner.temp }}/${{ inputs.workspace }}.duckdb"
          pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
            cp "s3://${S3_BUCKET}/.catalogs/${{ inputs.workspace }}.duckdb" \
            "$CATALOG_PATH" 2>/dev/null || echo "No existing catalog found (first run)."
          echo "CATALOG_PATH=$CATALOG_PATH" >> "$GITHUB_ENV"

      - name: Resolve workspace config
        id: config
        run: |
          python3 -c "
          import tomllib, json
          with open('workspaces/${{ inputs.workspace }}/pixi.toml', 'rb') as f:
              m = tomllib.load(f)
          r = m.get('tool', {}).get('registry', {})
          schema = r.get('schema', '${{ inputs.workspace }}')
          mode = r.get('mode', 'append')
          tables = r.get('tables', r.get('table', ''))
          if isinstance(tables, str):
              tables = [tables]
          print(f'schema={schema}')
          print(f'mode={mode}')
          print(f'tables={json.dumps(tables)}')
          " >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        env:
          OUTPUT_DIR: ${{ runner.temp }}/output
          CATALOG_PATH: ${{ env.CATALOG_PATH }}
          WORKSPACE_SECRET_API_KEY: ${{ secrets[format('WS_{0}_API_KEY', inputs.workspace)] }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          pixi run -w ${{ inputs.workspace }} pipeline

      - name: Upload output to S3
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
        run: |
          OUTPUT_DIR="${{ runner.temp }}/output"
          SCHEMA="${{ steps.config.outputs.schema }}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)

          if ! ls "$OUTPUT_DIR"/*.parquet 1>/dev/null 2>&1; then
            echo "No Parquet files found in output directory."
            exit 1
          fi

          # Upload each parquet file into a table subdirectory with a
          # timestamped filename.  This prevents overwriting previous
          # extractions and lets DuckLake track each file independently.
          #   s3://bucket/<schema>/<table>/<timestamp>.parquet
          COUNT=0
          for f in "$OUTPUT_DIR"/*.parquet; do
            TABLE=$(basename "$f" .parquet)
            pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
              cp "$f" "s3://${S3_BUCKET}/${SCHEMA}/${TABLE}/${TIMESTAMP}.parquet"
            COUNT=$((COUNT + 1))
            echo "  ${TABLE}/${TIMESTAMP}.parquet"
          done
          echo "Uploaded ${COUNT} Parquet file(s)."

      - name: Upload workspace catalog to S3
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
        run: |
          CATALOG_PATH="${{ runner.temp }}/${{ inputs.workspace }}.duckdb"
          if [ -f "$CATALOG_PATH" ]; then
            pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
              cp "$CATALOG_PATH" \
              "s3://${S3_BUCKET}/.catalogs/${{ inputs.workspace }}.duckdb"
            echo "Uploaded workspace catalog."
          fi

      - name: Trigger catalog merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run merge-catalog.yml \
            --field workspace=${{ inputs.workspace }} \
            2>/dev/null || echo "merge-catalog.yml not found or dispatch failed."
