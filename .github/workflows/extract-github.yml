name: "Extract (GitHub Runner)"
run-name: "Extract (GitHub): ${{ inputs.workspace }}"

on:
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      workspace:
        required: true
        type: string
        description: "Workspace name (directory under workspaces/)"

concurrency:
  group: extract-${{ inputs.workspace }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  extract:
    name: "Extract: ${{ inputs.workspace }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Register workspace
        env:
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          pixi workspace register \
            --name "$WORKSPACE" \
            --path "workspaces/$WORKSPACE"

      - name: Pull workspace catalog from S3 (default storage)
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
          WORKSPACE: ${{ inputs.workspace }}
          RUNNER_TEMP: ${{ runner.temp }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          CATALOG_PATH="${RUNNER_TEMP}/${WORKSPACE}.duckdb"
          PREFIX=""
          [ -n "$REPO_OWNER" ] && [ -n "$REPO_NAME" ] && PREFIX="${REPO_OWNER}/${REPO_NAME}/"
          [ -n "$BRANCH" ] && PREFIX="${PREFIX}${BRANCH}/"
          pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
            cp "s3://${S3_BUCKET}/${PREFIX}.catalogs/${WORKSPACE}.duckdb" \
            "$CATALOG_PATH" 2>/dev/null || echo "No existing catalog found (first run)."
          echo "CATALOG_PATH=$CATALOG_PATH" >> "$GITHUB_ENV"

      - name: Run pipeline
        env:
          OUTPUT_DIR: ${{ runner.temp }}/output
          CATALOG_PATH: ${{ env.CATALOG_PATH }}
          WORKSPACE_SECRET_API_KEY: ${{ secrets[format('WS_{0}_API_KEY', inputs.workspace)] }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          pixi run -w "$WORKSPACE" pipeline

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Upload output to all storages
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_WRITE_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          S3_WRITE_SECRET: ${{ secrets.S3_WRITE_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKSPACE: ${{ inputs.workspace }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          CATALOG_PATH="${RUNNER_TEMP}/${WORKSPACE}.duckdb"
          CATALOG_ARG=""
          [ -f "$CATALOG_PATH" ] && CATALOG_ARG="--catalog $CATALOG_PATH"
          uv run .github/scripts/upload_output.py \
            --workspace "$WORKSPACE" \
            --output-dir "${RUNNER_TEMP}/output" \
            --timestamp "$TIMESTAMP" \
            $CATALOG_ARG

      - name: Trigger catalog merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          gh workflow run merge-catalog.yml \
            --field "workspace=$WORKSPACE" \
            2>/dev/null || echo "merge-catalog.yml not found or dispatch failed."
