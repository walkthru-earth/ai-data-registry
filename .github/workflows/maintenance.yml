name: Workspace Maintenance

on:
  schedule:
    - cron: '0 3 * * 0'       # Sunday 3 AM UTC
  workflow_dispatch: {}        # Manual trigger

permissions:
  contents: read

jobs:
  maintain:
    name: Catalog maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - uses: prefix-dev/setup-pixi@v0.9
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Run maintenance on workspace catalogs
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
        run: |
          uv run .github/scripts/maintenance.py
