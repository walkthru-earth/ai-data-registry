name: PR Cleanup (Staging Data)

# Automatically clean up staging data when a PR is closed or merged.
# Deletes s3://bucket/pr/{pr_number}/ and any PR-scoped catalog files.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  cleanup:
    name: "Cleanup PR #${{ github.event.pull_request.number }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9
        with:
          cache: true

      - name: Delete staging data from S3
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          STAGING_PREFIX="s3://${S3_BUCKET}/pr/${PR_NUMBER}/"

          echo "Cleaning up staging data for PR #${PR_NUMBER}..."
          echo "  Prefix: ${STAGING_PREFIX}"

          # Delete all files under the PR staging prefix
          pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
            rm "${STAGING_PREFIX}*" 2>/dev/null || echo "  No staging data found (nothing to clean up)."

          # Also delete any PR-scoped catalog files
          pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
            rm "s3://${S3_BUCKET}/pr/${PR_NUMBER}.ducklake" 2>/dev/null || true

          echo "  Cleanup complete."
