name: "PR Extract (Staging)"
run-name: "PR Extract: #${{ inputs.pr_number || github.event.issue.number }} ${{ inputs.workspace || '' }}"

# Maintainer-triggered full extraction on PR data.
# Uploads to s3://bucket/{owner}/{repo}/pr/{pr_number}/{workspace}/ instead of production paths.
# Triggered by:
#   1. Maintainer comment "/run-extract" on a PR
#   2. Manual workflow_dispatch with PR number and workspace

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string
        description: "PR number to extract"
      workspace:
        required: true
        type: string
        description: "Workspace name (directory under workspaces/)"

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  parse-command:
    name: Parse /run-extract command
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/run-extract'))
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.parse.outputs.pr_number }}
      workspaces: ${{ steps.parse.outputs.workspaces }}
      ref: ${{ steps.parse.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Check maintainer permissions
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          PERMISSION=$(gh api "repos/$REPO/collaborators/$COMMENT_USER/permission" --jq '.permission' 2>/dev/null || echo "none")
          ROLE=$(gh api "orgs/$REPO_OWNER/memberships/$COMMENT_USER" --jq '.role' 2>/dev/null || echo "")
          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "maintain" || "$PERMISSION" == "write" || "$ROLE" == "admin" || "$ROLE" == "member" ]]; then
            echo "User $COMMENT_USER has access (permission=$PERMISSION, org_role=$ROLE)."
          else
            echo "User $COMMENT_USER does not have write access. Ignoring."
            exit 1
          fi

      - name: Parse command
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_WORKSPACE: ${{ inputs.workspace }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            WORKSPACES="[\"$INPUT_WORKSPACE\"]"
          else
            PR_NUMBER="$ISSUE_NUMBER"
            # Parse workspace names from comment: /run-extract [workspace1] [workspace2]
            WS_ARGS=$(echo "$COMMENT_BODY" | sed 's|/run-extract||' | xargs)
            if [ -z "$WS_ARGS" ]; then
              # Auto-detect changed workspaces in the PR
              CHANGED=$(gh pr diff "$PR_NUMBER" --name-only -- workspaces/ 2>/dev/null || echo "")
              WS_ARGS=$(echo "$CHANGED" | grep -oP '^workspaces/\K[^/]+' | sort -u | xargs)
            fi
            WORKSPACES=$(echo "$WS_ARGS" | tr ' ' '\n' | jq -R . | jq -sc .)
          fi

          # Validate PR number is numeric
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: PR number must be numeric, got: $PR_NUMBER"
            exit 1
          fi

          # Validate workspace names
          for WS in $(echo "$WORKSPACES" | jq -r '.[]'); do
            if ! [[ "$WS" =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "ERROR: Invalid workspace name: $WS"
              exit 1
            fi
          done

          # Get PR head ref for checkout
          REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "workspaces=$WORKSPACES" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUMBER, workspaces: $WORKSPACES, ref: $REF"

      - name: React to comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content='rocket' 2>/dev/null || true

  extract:
    name: "PR Extract: ${{ matrix.workspace }}"
    needs: parse-command
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.parse-command.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.ref }}

      - uses: astral-sh/setup-uv@v8

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Register workspace
        env:
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          pixi workspace register \
            --name "$WORKSPACE" \
            --path "workspaces/$WORKSPACE"

      - name: Run full pipeline
        env:
          OUTPUT_DIR: ${{ runner.temp }}/output
          WORKSPACE_SECRET_API_KEY: ${{ secrets[format('WS_{0}_API_KEY', matrix.workspace)] }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          pixi run -w "$WORKSPACE" pipeline

      - name: Upload to S3 staging prefix
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
          WORKSPACE: ${{ matrix.workspace }}
          RUNNER_TEMP: ${{ runner.temp }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/output"
          REPO_PREFIX=""
          [ -n "$REPO_OWNER" ] && [ -n "$REPO_NAME" ] && REPO_PREFIX="${REPO_OWNER}/${REPO_NAME}/"
          STAGING_PREFIX="s3://${S3_BUCKET}/${REPO_PREFIX}pr/${PR_NUMBER}/${WORKSPACE}"

          if ls "$OUTPUT_DIR"/*.parquet 1>/dev/null 2>&1; then
            pixi run s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
              cp "$OUTPUT_DIR/*.parquet" "${STAGING_PREFIX}/"
            FILE_COUNT=$(ls "$OUTPUT_DIR"/*.parquet | wc -l)
            echo "Uploaded $FILE_COUNT Parquet file(s) to ${STAGING_PREFIX}/"
          else
            echo "No Parquet files found in output directory."
            exit 1
          fi

      - name: Validate staged output
        env:
          OUTPUT_DIR: ${{ runner.temp }}/output
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          uv run .github/scripts/validate_output.py \
            "workspaces/$WORKSPACE/pixi.toml" \
            "$OUTPUT_DIR"

  report:
    name: Post PR report
    needs: [parse-command, extract]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.ref }}

      - name: Build report
        id: report
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
          WORKSPACES: ${{ needs.parse-command.outputs.workspaces }}
          EXTRACT_RESULT: ${{ needs.extract.result }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          STATUS_ICON="✅"
          if [ "$EXTRACT_RESULT" != "success" ]; then
            STATUS_ICON="❌"
          fi

          # Build workspace list and query examples
          WS_LIST=""
          QUERY_EXAMPLES=""
          REPO_PREFIX=""
          [ -n "$REPO_OWNER" ] && [ -n "$REPO_NAME" ] && REPO_PREFIX="${REPO_OWNER}/${REPO_NAME}/"
          for WS in $(echo "$WORKSPACES" | jq -r '.[]'); do
            STAGING_PREFIX="s3://${S3_BUCKET}/${REPO_PREFIX}pr/${PR_NUMBER}/${WS}"
            WS_LIST="${WS_LIST}\n- \`${WS}\` → \`${STAGING_PREFIX}/\`"

            # Read schema.table from workspace pixi.toml if available
            SCHEMA=$(python3 -c "
          import tomllib
          with open('workspaces/${WS}/pixi.toml', 'rb') as f:
              m = tomllib.load(f)
          r = m.get('tool', {}).get('registry', {})
          print(r.get('schema', '${WS}'))
          " 2>/dev/null || echo "$WS")

            TABLE=$(python3 -c "
          import tomllib
          with open('workspaces/${WS}/pixi.toml', 'rb') as f:
              m = tomllib.load(f)
          r = m.get('tool', {}).get('registry', {})
          print(r.get('table', 'data'))
          " 2>/dev/null || echo "data")

            QUERY_EXAMPLES="${QUERY_EXAMPLES}
          -- Query staged ${WS} data
          SELECT * FROM read_parquet('${STAGING_PREFIX}/*.parquet') LIMIT 10;"
          done

          # Write comment body
          cat > /tmp/pr-comment.md << 'COMMENT_EOF'
          ## ${STATUS_ICON} PR Extract Report (PR #${PR_NUMBER})

          **Workspaces extracted:**
          ${WS_LIST}

          <details>
          <summary>Query staged data with DuckDB</summary>

          ```sql
          -- Set S3 credentials first
          SET s3_endpoint = '<your-endpoint>';
          SET s3_access_key_id = '<key>';
          SET s3_secret_access_key = '<secret>';
          ${QUERY_EXAMPLES}
          ```

          </details>

          > Staging data will be automatically cleaned up when this PR is closed or merged.
          > To re-run extraction: comment \`/run-extract\` or \`/run-extract <workspace>\`
          COMMENT_EOF

          # Use envsubst for variable expansion
          export STATUS_ICON WS_LIST QUERY_EXAMPLES PR_NUMBER
          envsubst < /tmp/pr-comment.md > /tmp/pr-comment-final.md

          echo "comment_file=/tmp/pr-comment-final.md" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file /tmp/pr-comment-final.md 2>/dev/null || \
            echo "Failed to post PR comment."
