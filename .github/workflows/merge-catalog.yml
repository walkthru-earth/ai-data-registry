name: Merge Catalog
run-name: "Merge Catalog: ${{ inputs.workspace }}"

on:
  workflow_dispatch:
    inputs:
      workspace:
        required: true
        type: string
        description: "Workspace whose catalog to merge into global"
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string

# Serial execution: only one merge at a time, queued (not cancelled)
concurrency:
  group: catalog-merge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    name: "Merge: ${{ inputs.workspace }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Merge workspace catalog into global
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_WRITE_SECRET }}
        run: |
          uv run .github/scripts/merge_catalog.py \
            --workspace ${{ inputs.workspace }}
