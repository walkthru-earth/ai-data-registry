[workspace]
authors = ["yharby <me@youssefharby.com>"]
channels = ["conda-forge"]
name = "openmeteo"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]
extract = "python extract.py"
validate = { cmd = "python validate_local.py", depends-on = ["extract"] }
pipeline = { depends-on = ["extract", "validate"] }
dry-run = { cmd = "python extract.py", env = { DRY_RUN = "1" } }

[dependencies]
python = ">=3.14.3,<3.15"

[pypi-dependencies]
duckdb = ">=1.5.1"

[tool.registry]
description = "Global weather, forecasts, and air quality from Open-Meteo API for ~3,000 cities (pop >= 200K) across 150+ countries"
schedule = "0 6 * * *"
timeout = 30
tags = ["weather", "climate", "air-quality", "forecast", "global", "open-meteo", "temperature", "precipitation"]
schema = "openmeteo"
tables = ["weather_hourly", "weather_daily", "air_quality"]
mode = "replace"

[tool.registry.runner]
backend = "github"
flavor = "ubuntu-latest"

[tool.registry.license]
code = "Apache-2.0"
data = "CC-BY-4.0"
data_source = "Open-Meteo"
mixed = false

[tool.registry.checks]
schema_match = true

[tool.registry.checks.weather_hourly]
min_rows = 1000
max_null_pct = 15
geometry = true
unique_cols = ["city", "country_code", "latitude", "longitude", "time"]

[tool.registry.checks.weather_daily]
min_rows = 100
max_null_pct = 10
geometry = true
unique_cols = ["city", "country_code", "latitude", "longitude", "date"]

[tool.registry.checks.air_quality]
min_rows = 200
max_null_pct = 25
geometry = true
unique_cols = ["city", "country_code", "latitude", "longitude", "time"]
